<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Usuarios - Proyecto Final</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Arial, Helvetica, sans-serif;
      background: #f4f7f9;
      color: #1d2730;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px 16px;
    }

    main {
      width: min(760px, 100%);
      background: #ffffff;
      border: 1px solid #d9e1e7;
      border-radius: 8px;
      box-shadow: 0 16px 42px rgba(24, 42, 57, 0.12);
      overflow: hidden;
    }

    header {
      padding: 28px 32px 20px;
      border-bottom: 1px solid #e6edf2;
    }

    h1 {
      margin: 0;
      font-size: 30px;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 8px 0 0;
      color: #5d6b76;
      font-size: 15px;
    }

    section {
      padding: 28px 32px 32px;
    }

    form {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: end;
      margin-bottom: 26px;
    }

    label {
      display: grid;
      gap: 7px;
      font-weight: 700;
      color: #2a3945;
    }

    input {
      height: 44px;
      border: 1px solid #b9c7d1;
      border-radius: 6px;
      padding: 0 12px;
      font-size: 16px;
    }

    button {
      height: 46px;
      border: 0;
      border-radius: 6px;
      padding: 0 18px;
      background: #126e82;
      color: #ffffff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover {
      background: #0f5d6f;
    }

    .status {
      min-height: 22px;
      margin: -12px 0 18px;
      color: #25633f;
      font-weight: 700;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      border: 1px solid #d9e1e7;
    }

    th,
    td {
      text-align: left;
      padding: 12px 14px;
      border-bottom: 1px solid #e6edf2;
    }

    th {
      background: #edf4f7;
      color: #283844;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    .empty {
      color: #697783;
      text-align: center;
    }

    @media (max-width: 560px) {
      header,
      section {
        padding-left: 20px;
        padding-right: 20px;
      }

      form {
        grid-template-columns: 1fr;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Usuarios</h1>
      <p class="subtitle">Formulario local para repasar la demo de Flask + MariaDB.</p>
    </header>

    <section>
      <form id="user-form">
        <label>
          Nombre
          <input id="name-input" name="nombre" type="text" autocomplete="name" required>
        </label>
        <button type="submit">Guardar</button>
      </form>

      <p id="status" class="status" aria-live="polite"></p>

      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Nombre</th>
          </tr>
        </thead>
        <tbody id="users-body"></tbody>
      </table>
    </section>
  </main>

  <script>
    const STORAGE_KEY = "proyecto-final-usuarios";
    const form = document.querySelector("#user-form");
    const input = document.querySelector("#name-input");
    const status = document.querySelector("#status");
    const usersBody = document.querySelector("#users-body");

    function loadUsers() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) return JSON.parse(saved);

      return [
        { id: 1, nombre: "Grupo Nati Ema y Oscar" }
      ];
    }

    function saveUsers(users) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(users));
    }

    function renderUsers() {
      const users = loadUsers();
      usersBody.innerHTML = "";

      if (users.length === 0) {
        usersBody.innerHTML = '<tr><td class="empty" colspan="2">No hay usuarios registrados.</td></tr>';
        return;
      }

      for (const user of users) {
        const row = document.createElement("tr");
        row.innerHTML = `<td>${user.id}</td><td>${user.nombre}</td>`;
        usersBody.appendChild(row);
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();

      const nombre = input.value.trim();
      if (!nombre) return;

      const users = loadUsers();
      const nextId = users.length ? Math.max(...users.map((user) => user.id)) + 1 : 1;
      users.push({ id: nextId, nombre });
      saveUsers(users);

      input.value = "";
      status.textContent = `Usuario "${nombre}" guardado correctamente.`;
      renderUsers();
    });

    renderUsers();
  </script>
</body>
</html>
